name: Weekly Kaspi scrape

# Запускается:
#  1) по расписанию — каждый понедельник в 04:00 UTC (~09:00 Астана)
#  2) вручную кнопкой "Run workflow" во вкладке Actions
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Собрать сырьё
        run: python -m scraper.fetch

      - name: Распарсить в недельный срез
        run: python -m scraper.parse

      - name: Пересчитать аналитику (velocity, оценка продаж)
        run: python -m pipeline.estimate

      - name: Закоммитить новые данные
        run: |
          git config user.name "kaspipulse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          # коммитим только если что-то изменилось
          git diff --staged --quiet || git commit -m "data: weekly snapshot $(date -u +%Y-%m-%d)"
          git push
